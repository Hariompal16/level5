name:deploy to ec2
 on:
   push:
     branches:
       - main

  jobs:
    deploy:
      runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: deploy via ssh
        uses: appleboy/ssh-actionv@1
        with:
          host:${{secrets.SSH_HOST}}
          username:ubuntu
          key:${{secrets.SSH_KEY}}

          script: |
            cd ~/level5
            git pull 
            sudo docker compose down
            sudo docker compose up -d --build
